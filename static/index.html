<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura — Conversational Voice Assistant</title>
  <!-- Load Outfit Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0d0f14;
      --panel-bg: rgba(20, 24, 33, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.4);
      --accent-green: #10b981;
      --accent-green-glow: rgba(16, 185, 129, 0.4);
      --accent-blue: #3b82f6;
      --accent-blue-glow: rgba(59, 130, 246, 0.4);
      --accent-gray: #4b5563;
      --accent-gray-glow: rgba(75, 85, 99, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
    }

    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      width: 95vw;
      max-width: 1200px;
      height: 85vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Left Sidebar: Controls & Settings */
    .sidebar {
      border-right: 1px solid var(--border-color);
      background: rgba(15, 18, 25, 0.5);
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 18px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #ffffff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .control-value {
      color: var(--text-main);
      font-weight: 500;
    }

    select, input[type="range"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text-main);
      outline: none;
      transition: all 0.3s;
    }

    select:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 10px var(--accent-purple-glow);
    }

    select option {
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      padding: 0;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-purple);
      box-shadow: 0 0 8px var(--accent-purple-glow);
    }

    /* Main Console Area */
    .main-console {
      display: grid;
      grid-template-rows: 1fr 220px;
      height: 100%;
    }

    .orb-stage {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      border-bottom: 1px solid var(--border-color);
      padding: 40px;
    }

    .status-badge {
      position: absolute;
      top: 30px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-gray);
      box-shadow: 0 0 8px var(--accent-gray-glow);
    }

    /* Orb Animations */
    .orb-outer {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .orb {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, #374151 0%, #111827 100%);
      box-shadow: 0 0 30px var(--accent-gray-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.5s ease;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .orb-pulse {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50%;
      z-index: 1;
      opacity: 0;
      transition: all 0.5s;
    }

    /* Orb States */
    .orb-outer.state-idle .orb {
      background: radial-gradient(circle, #4b5563 0%, #1f2937 100%);
      box-shadow: 0 0 25px rgba(75, 85, 99, 0.3);
      animation: breathe 4s infinite ease-in-out;
    }

    .orb-outer.state-listening .orb {
      background: radial-gradient(circle, #10b981 0%, #047857 100%);
      box-shadow: 0 0 40px var(--accent-green-glow);
    }

    .orb-outer.state-listening .orb-pulse {
      border: 2px solid var(--accent-green);
      animation: ripple 1.5s infinite linear;
      opacity: 0.8;
    }

    .orb-outer.state-thinking .orb {
      background: radial-gradient(circle, #3b82f6 0%, #1d4ed8 100%);
      box-shadow: 0 0 45px var(--accent-blue-glow);
      animation: pulse-scale 1s infinite alternate;
    }

    .orb-outer.state-thinking .orb-pulse {
      border: 2px solid var(--accent-blue);
      animation: spin-glow 2s infinite linear;
      border-top-color: transparent;
      opacity: 0.8;
    }

    .orb-outer.state-speaking .orb {
      background: radial-gradient(circle, #8b5cf6 0%, #5b21b6 100%);
      box-shadow: 0 0 50px var(--accent-purple-glow);
    }

    .orb-outer.state-speaking .orb-pulse {
      border: 2px solid var(--accent-purple);
      animation: ripple 1.2s infinite linear;
      opacity: 0.8;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    @keyframes pulse-scale {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    @keyframes spin-glow {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Dual Wave Visualizers */
    .visualizer-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      gap: 30px;
      margin-top: 30px;
    }

    .visualizer-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .visualizer-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    canvas {
      width: 100%;
      height: 50px;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    /* Chat log panel */
    .chat-container {
      background: rgba(10, 12, 17, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .btn-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      transition: color 0.2s;
    }

    .btn-clear:hover {
      color: #ef4444;
    }

    .chat-messages {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.3s forwards;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(59, 130, 246, 0.05));
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-bottom-right-radius: 4px;
    }

    .message.agent {
      align-self: flex-start;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.05));
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-bottom-left-radius: 4px;
    }

    .message.interim {
      align-self: flex-end;
      background: transparent;
      border: 1px dashed rgba(59, 130, 246, 0.3);
      color: var(--text-muted);
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Actions & Buttons */
    .action-buttons {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button.btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button.btn-connect {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      color: white;
      box-shadow: 0 4px 15px var(--accent-purple-glow);
    }

    button.btn-connect.connected {
      background: #dc2626;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
    }

    button.btn-mic {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    button.btn-mic:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
    }

    button.btn-mic.active {
      background: #dc2626;
      color: white;
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
      border-color: transparent;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Latency Monitor Styles */
    .latency-monitor {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .latency-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .latency-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: all 0.3s ease;
      align-items: center;
      text-align: center;
    }

    .latency-card.highlight {
      background: rgba(139, 92, 246, 0.08);
      border-color: rgba(139, 92, 246, 0.25);
      grid-column: span 2;
    }

    .latency-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .latency-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }

    .latency-card.highlight .latency-value {
      color: #a78bfa;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="app-container">
    
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">A</div>
        <div class="logo-text">Aura AI</div>
      </div>
      
      <div style="height: 1px; background: var(--border-color); margin: 8px 0;"></div>
      
      <div class="section-title">Voice Configuration</div>
      
      <div class="control-group">
        <label for="voiceSelect">AI Speaker Voice</label>
        <select id="voiceSelect">
          <option value="af_heart">American Female (Heart - Default)</option>
          <option value="af_bella">American Female (Bella - Soft)</option>
          <option value="af_sarah">American Female (Sarah - Rich)</option>
          <option value="af_sky">American Female (Sky)</option>
          <option value="am_adam">American Male (Adam)</option>
          <option value="am_michael">American Male (Michael)</option>
          <option value="bf_emma">British Female (Emma)</option>
          <option value="bm_george">British Male (George)</option>
          <option value="if_sara">Indian Female (Sara)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="bargeInSelect">Voice Interruption (Barge-in)</label>
        <select id="bargeInSelect">
          <option value="adaptive">Adaptive Mode (Speakers - Recommended)</option>
          <option value="sensitive">Sensitive Mode (Headset)</option>
          <option value="disabled">Tap / Click Orb to Interrupt Only</option>
        </select>
      </div>

      <div class="section-title" style="margin-top: 10px;">VAD & Sensitivity</div>
      
      <div class="control-group">
        <label>Silence Cutoff <span id="silenceVal" class="control-value">1000ms</span></label>
        <input type="range" id="silenceSlider" min="500" max="2500" step="100" value="1000" />
      </div>

      <div class="control-group">
        <label>Min Speaking Duration <span id="speakingVal" class="control-value">400ms</span></label>
        <input type="range" id="speakingSlider" min="200" max="1000" step="50" value="400" />
      </div>

      <div class="control-group">
        <label>Mic Sensitivity <span id="sensitivityVal" class="control-value">0.030</span></label>
        <input type="range" id="sensitivitySlider" min="0.005" max="0.100" step="0.005" value="0.030" />
      </div>

      <div class="control-group">
        <label>Output Volume <span id="volumeVal" class="control-value">100%</span></label>
        <input type="range" id="volumeSlider" min="0" max="100" value="100" />
      </div>

      <!-- Latency Monitor -->
      <div class="latency-monitor">
        <div class="section-title">Latency Monitor</div>
        <div class="latency-grid">
          <div class="latency-card">
            <span class="latency-label">ASR (Transcribe)</span>
            <span id="asrLatency" class="latency-value">-- ms</span>
          </div>
          <div class="latency-card">
            <span class="latency-label">LLM (Gemini TTFT)</span>
            <span id="llmLatency" class="latency-value">-- ms</span>
          </div>
          <div class="latency-card">
            <span class="latency-label">TTS (Kokoro TTFA)</span>
            <span id="ttsLatency" class="latency-value">-- ms</span>
          </div>
          <div class="latency-card highlight">
            <span class="latency-label">Total Processing</span>
            <span id="totalLatency" class="latency-value">-- ms</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="connectBtn" class="btn-primary btn-connect">Connect Agent</button>
        <button id="micBtn" class="btn-primary btn-mic" disabled>Start Call</button>
      </div>
    </div>

    <!-- Main Console & Chat -->
    <div class="main-console">
      
      <!-- Top Section: Orb & Visualizers -->
      <div class="orb-stage">
        <div id="statusBadge" class="status-badge">
          <div id="statusDot" class="status-dot"></div>
          <span id="statusText">Disconnected</span>
        </div>

        <div id="orbOuter" class="orb-outer state-idle">
          <div class="orb-pulse"></div>
          <div class="orb">
            <!-- Central icon inside orb -->
            <svg id="orbIcon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" viewBox="0 0 24 24" style="color: white; opacity: 0.9;">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3zm5.5 10a5.5 5.5 0 0 1-11 0H5a7 7 0 0 0 13.9 0h-1.4zM11 18.9v2.1h2v-2.1c3.1-.4 5.5-3 5.5-6.2h-2c0 2.5-2 4.5-4.5 4.5S7.5 15.2 7.5 12.8h-2c0 3.2 2.4 5.8 5.5 6.2z"/>
            </svg>
          </div>
        </div>

        <div class="visualizer-container">
          <div class="visualizer-box">
            <span class="visualizer-label">You (Mic Input)</span>
            <canvas id="userVisualizer"></canvas>
          </div>
          <div class="visualizer-box">
            <span class="visualizer-label">Aura (Speaker Output)</span>
            <canvas id="agentVisualizer"></canvas>
          </div>
        </div>
      </div>

      <!-- Bottom Section: Chat log -->
      <div class="chat-container">
        <div class="chat-header">
          <span class="chat-title">Conversation Logs</span>
          <button id="clearChatBtn" class="btn-clear">Clear Logs</button>
        </div>
        <div id="chatMessages" class="chat-messages">
          <!-- Initial message -->
          <div class="message agent">
            Hello! I am Aura. Connect the agent and start speaking to chat with me.
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Elements
    const connectBtn = document.getElementById('connectBtn');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const orbOuter = document.getElementById('orbOuter');
    const chatMessages = document.getElementById('chatMessages');
    const clearChatBtn = document.getElementById('clearChatBtn');
    
    // Sliders & settings
    const voiceSelect = document.getElementById('voiceSelect');
    const bargeInSelect = document.getElementById('bargeInSelect');
    const silenceSlider = document.getElementById('silenceSlider');
    const silenceVal = document.getElementById('silenceVal');
    const speakingSlider = document.getElementById('speakingSlider');
    const speakingVal = document.getElementById('speakingVal');
    const sensitivitySlider = document.getElementById('sensitivitySlider');
    const sensitivityVal = document.getElementById('sensitivityVal');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeVal = document.getElementById('volumeVal');

    // Visualizers
    const userCanvas = document.getElementById('userVisualizer');
    const agentCanvas = document.getElementById('agentVisualizer');
    const userCtx = userCanvas.getContext('2d');
    const agentCtx = agentCanvas.getContext('2d');

    // Global audio & state variables
    let socket = null;
    let recordingAudioContext = null;
    let playbackAudioContext = null;
    let recordingAnalyser = null;
    let playbackAnalyser = null;
    let gainNode = null; // Output volume gain
    let mediaStream = null;
    let processor = null;
    
    let isConnected = false;
    let isRecording = false;
    
    // Playback queue variables
    let audioQueue = [];
    let isPlayingAudio = false;
    let nextStartTime = 0;
    let activeSources = [];

    // Animation frames
    let userAnimId = null;
    let agentAnimId = null;

    // Resize visualizer canvases
    function resizeCanvases() {
      userCanvas.width = userCanvas.clientWidth * window.devicePixelRatio;
      userCanvas.height = userCanvas.clientHeight * window.devicePixelRatio;
      agentCanvas.width = agentCanvas.clientWidth * window.devicePixelRatio;
      agentCanvas.height = agentCanvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();

    // Slider Event Listeners
    silenceSlider.addEventListener('input', (e) => {
      silenceVal.textContent = e.target.value + 'ms';
      sendSettings();
    });
    speakingSlider.addEventListener('input', (e) => {
      speakingVal.textContent = e.target.value + 'ms';
      sendSettings();
    });
    sensitivitySlider.addEventListener('input', (e) => {
      sensitivityVal.textContent = e.target.value;
      sendSettings();
    });
    volumeSlider.addEventListener('input', (e) => {
      volumeVal.textContent = e.target.value + '%';
      if (gainNode) {
        gainNode.gain.setValueAtTime(e.target.value / 100, playbackAudioContext.currentTime);
      }
    });
    voiceSelect.addEventListener('change', () => {
      sendSettings();
    });

    // Connection button
    connectBtn.addEventListener('click', async () => {
      if (isConnected) {
        disconnect();
      } else {
        await connect();
      }
    });

    // Mic button
    micBtn.addEventListener('click', async () => {
      if (isRecording) {
        stopRecording();
        micBtn.textContent = 'Start Call';
        micBtn.classList.remove('active');
        setOrbState('idle');
      } else {
        await startRecording();
        micBtn.textContent = 'Cut Call';
        micBtn.classList.add('active');
        setOrbState('listening');
      }
    });

    // Orb click listener: click to interrupt AI or toggle recording
    orbOuter.addEventListener('click', () => {
      if (!isConnected) {
        connectBtn.click();
        return;
      }
      if (isPlayingAudio) {
        console.log("Orb clicked. Interrupting AI playback manually.");
        stopAudioPlayback();
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: 'user_interrupted' }));
        }
        if (isRecording) {
          setOrbState('listening');
          statusText.textContent = 'Listening...';
        } else {
          setOrbState('idle');
          statusText.textContent = 'Connected (Ready)';
        }
        return;
      }
      // If AI is not speaking, toggle microphone
      micBtn.click();
    });

    clearChatBtn.addEventListener('click', () => {
      chatMessages.innerHTML = '';
    });

    // Set central orb state & colors
    function setOrbState(state) {
      orbOuter.className = 'orb-outer';
      
      if (state === 'idle') {
        orbOuter.classList.add('state-idle');
        statusDot.style.background = 'var(--accent-gray)';
        statusDot.style.boxShadow = '0 0 8px var(--accent-gray-glow)';
      } else if (state === 'listening') {
        orbOuter.classList.add('state-listening');
        statusDot.style.background = 'var(--accent-green)';
        statusDot.style.boxShadow = '0 0 8px var(--accent-green-glow)';
      } else if (state === 'thinking') {
        orbOuter.classList.add('state-thinking');
        statusDot.style.background = 'var(--accent-blue)';
        statusDot.style.boxShadow = '0 0 8px var(--accent-blue-glow)';
      } else if (state === 'speaking') {
        orbOuter.classList.add('state-speaking');
        statusDot.style.background = 'var(--accent-purple)';
        statusDot.style.boxShadow = '0 0 8px var(--accent-purple-glow)';
      }
    }

    // Connect to WebSocket
    async function connect() {
      try {
        const wsUrl = `ws://${window.location.host}/ws/audio`;
        socket = new WebSocket(wsUrl);
        socket.binaryType = 'arraybuffer';

        socket.onopen = () => {
          isConnected = true;
          connectBtn.textContent = 'Disconnect Agent';
          connectBtn.classList.add('connected');
          micBtn.disabled = false;
          statusText.textContent = 'Connected (Ready)';
          setOrbState('idle');
          sendSettings(); // sync settings on connection
          resetLatencyDisplay();
          appendMessage('agent', 'Connected successfully! Ready to converse.');
        };

        socket.onmessage = async (event) => {
          if (typeof event.data === 'string') {
            try {
              const data = JSON.parse(event.data);
              
              if (data.type === 'interim_transcription') {
                updateInterimMessage(data.text);
              } else if (data.type === 'transcription') {
                finalizeUserMessage(data.text);
                setOrbState('thinking');
                statusText.textContent = 'Thinking...';
              } else if (data.type === 'llm_response_chunk') {
                appendOrUpdateAgentResponse(data.text);
              } else if (data.type === 'status') {
                statusText.textContent = data.text;
                if (data.text.includes("Listening")) {
                  setOrbState('listening');
                } else if (data.text.includes("Thinking")) {
                  setOrbState('thinking');
                }
              } else if (data.type === 'audio_start') {
                audioQueue = [];
                isPlayingAudio = false;
                setOrbState('speaking');
                statusText.textContent = 'Speaking...';
              } else if (data.type === 'audio_end') {
                console.log("Audio stream finished.");
              } else if (data.type === 'audio_stop') {
                console.log("Audio stopped by server.");
                stopAudioPlayback();
                setOrbState('listening');
                statusText.textContent = 'Listening...';
              } else if (data.type === 'error') {
                appendMessage('agent', `Error: ${data.text}`);
                setOrbState('idle');
                statusText.textContent = 'Error occurred';
              } else if (data.type === 'latency_metrics') {
                try {
                  const metrics = JSON.parse(data.text);
                  updateLatencyDisplay(metrics);
                } catch (err) {
                  console.error("Error parsing latency metrics:", err);
                }
              }
            } catch (e) {
              console.error('JSON parse error:', e);
            }
          } else {
            // Push binary audio arraybuffer to queue and play
            audioQueue.push(event.data);
            playAudioQueue();
          }
        };

        socket.onclose = disconnect;
        socket.onerror = (error) => {
          console.error('WebSocket error:', error);
          disconnect();
        };

      } catch (error) {
        console.error('Connection error:', error);
        statusText.textContent = `Error: ${error.message}`;
        setOrbState('idle');
      }
    }

    function disconnect() {
      if (socket) {
        socket.close();
        socket = null;
      }
      if (isRecording) {
        stopRecording();
      }
      stopAudioPlayback();
      resetLatencyDisplay();

      isConnected = false;
      connectBtn.textContent = 'Connect Agent';
      connectBtn.classList.remove('connected');
      micBtn.disabled = true;
      micBtn.textContent = 'Start Call';
      micBtn.classList.remove('active');
      statusText.textContent = 'Disconnected';
      setOrbState('idle');
      appendMessage('agent', 'Agent disconnected.');
    }

    // Dynamic configuration update
    function sendSettings() {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: 'update_settings',
          voice: voiceSelect.value,
          max_silence_ms: parseInt(silenceSlider.value),
          min_speaking_ms: parseInt(speakingSlider.value),
          energy_threshold: parseFloat(sensitivitySlider.value)
        }));
      }
    }

    // Audio Playback Lazy Init
    function getPlaybackAudioContext() {
      if (!playbackAudioContext || playbackAudioContext.state === 'closed') {
        playbackAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        
        playbackAnalyser = playbackAudioContext.createAnalyser();
        playbackAnalyser.fftSize = 256;
        
        gainNode = playbackAudioContext.createGain();
        gainNode.gain.setValueAtTime(volumeSlider.value / 100, playbackAudioContext.currentTime);

        playbackAnalyser.connect(gainNode);
        gainNode.connect(playbackAudioContext.destination);
        
        drawAgentVisualizer();
      }
      return playbackAudioContext;
    }

    // Play next chunk in queue (Gapless scheduled audio queue)
    function playAudioQueue() {
      if (!audioQueue.length) {
        return;
      }

      const currentCtx = getPlaybackAudioContext();
      
      // Resume context if suspended
      if (currentCtx.state === 'suspended') {
        currentCtx.resume();
      }

      // If we are already scheduling sources, wait for end events to cascade
      if (isPlayingAudio && nextStartTime > currentCtx.currentTime + 0.1) {
        return;
      }

      isPlayingAudio = true;
      const rawChunk = audioQueue.shift();
      
      currentCtx.decodeAudioData(rawChunk, (audioBuffer) => {
        const source = currentCtx.createBufferSource();
        source.buffer = audioBuffer;
        
        // Connect source to analyser
        source.connect(playbackAnalyser);
        
        // Precise gapless scheduling
        let playTime = Math.max(currentCtx.currentTime, nextStartTime);
        source.start(playTime);
        nextStartTime = playTime + audioBuffer.duration;
        
        activeSources.push(source);
        
        source.onended = () => {
          activeSources = activeSources.filter(s => s !== source);
          if (activeSources.length === 0 && audioQueue.length === 0) {
            isPlayingAudio = false;
            nextStartTime = 0;
            // Return to listening state when agent is done speaking
            if (isRecording) {
              setOrbState('listening');
              statusText.textContent = 'Listening...';
            } else {
              setOrbState('idle');
              statusText.textContent = 'Connected (Ready)';
            }
          } else {
            playAudioQueue();
          }
        };
      }, (e) => {
        console.error("Error decoding audio segment:", e);
        isPlayingAudio = false;
        playAudioQueue();
      });
    }

    function stopAudioPlayback() {
      activeSources.forEach(src => {
        try {
          src.stop();
        } catch(e) {}
      });
      activeSources = [];
      audioQueue = [];
      isPlayingAudio = false;
      nextStartTime = 0;
    }

    // Dynamic playback volume tracking to calibrate adaptive VAD echo thresholding
    let playbackRmsHistory = [0, 0, 0];

    function getPlaybackRMS() {
      if (!playbackAnalyser) return 0;
      const bufferLength = playbackAnalyser.fftSize;
      const dataArray = new Uint8Array(bufferLength);
      playbackAnalyser.getByteTimeDomainData(dataArray);
      
      let sumSquares = 0;
      for (let i = 0; i < bufferLength; i++) {
        const normalizedValue = (dataArray[i] - 128) / 128;
        sumSquares += normalizedValue * normalizedValue;
      }
      return Math.sqrt(sumSquares / bufferLength);
    }

    // Microphone audio capture at 16000Hz natively
    async function startRecording() {
      try {
        recordingAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: false,
            channelCount: 1,
            sampleRate: 16000
          }
        });

        const source = recordingAudioContext.createMediaStreamSource(mediaStream);
        recordingAnalyser = recordingAudioContext.createAnalyser();
        recordingAnalyser.fftSize = 256;
        source.connect(recordingAnalyser);

        // 2048 buffer size gives ~128ms chunks at 16kHz
        processor = recordingAudioContext.createScriptProcessor(2048, 1, 1);
        recordingAnalyser.connect(processor);
        processor.connect(recordingAudioContext.destination);

        processor.onaudioprocess = (e) => {
          if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;

          const floatData = e.inputBuffer.getChannelData(0);
          
          // Audio energy verification for client-side barge-in
          let rms = 0;
          for (let i = 0; i < floatData.length; i++) {
            rms += floatData[i] * floatData[i];
          }
          rms = Math.sqrt(rms / floatData.length);

          const mode = bargeInSelect.value;
          
          if (isPlayingAudio) {
            if (mode === 'disabled') {
              // Tap to interrupt only: mute mic during playback
              return;
            }
            
            // Get current playback volume level
            const currentPlaybackRms = getPlaybackRMS();
            playbackRmsHistory.push(currentPlaybackRms);
            if (playbackRmsHistory.length > 3) {
              playbackRmsHistory.shift();
            }
            const maxPlaybackRms = Math.max(...playbackRmsHistory);

            // For adaptive (speakers) and sensitive (headset) voice barge-in modes:
            const baseThreshold = parseFloat(sensitivitySlider.value) || 0.030;
            
            // Dynamically calculate threshold based on the maximum playing volume in the recent window.
            // Coupling factor of 1.2 matches typical speaker-to-mic feedback ratios.
            const couplingFactor = 1.2;
            const activeThreshold = (mode === 'adaptive')
              ? baseThreshold + (maxPlaybackRms * couplingFactor)
              : baseThreshold;
            
            if (rms > activeThreshold) {
              console.log(`Barge-in: Mic RMS (${rms.toFixed(4)}) > Threshold (${activeThreshold.toFixed(4)}). Max Playback RMS was ${maxPlaybackRms.toFixed(4)}. Stopping playback.`);
              stopAudioPlayback();
              socket.send(JSON.stringify({ type: 'user_interrupted' }));
              setOrbState('listening');
              statusText.textContent = 'Listening...';
            } else {
              // Echo/noise is below threshold: do not send to server to prevent self-transcription
              return;
            }
          } else {
            // Reset history when not playing audio
            playbackRmsHistory = [0, 0, 0];
          }

          // Convert float to int16 PCM bytes
          const int16Buffer = new Int16Array(floatData.length);
          for (let i = 0; i < floatData.length; i++) {
            int16Buffer[i] = Math.max(-1, Math.min(1, floatData[i])) * 0x7FFF;
          }
          
          socket.send(int16Buffer.buffer);
        };

        isRecording = true;
        drawUserVisualizer();
      } catch (err) {
        console.error("Microphone capture failed:", err);
        appendMessage('agent', `Microphone access error: ${err.message}`);
        disconnect();
      }
    }

    function stopRecording() {
      isRecording = false;
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      if (processor) {
        processor.disconnect();
        processor = null;
      }
      if (recordingAudioContext && recordingAudioContext.state !== 'closed') {
        recordingAudioContext.close().catch(e => console.error(e));
        recordingAudioContext = null;
      }
      if (userAnimId) {
        cancelAnimationFrame(userAnimId);
        userAnimId = null;
      }
      // Clear visualizer canvas
      userCtx.clearRect(0, 0, userCanvas.width, userCanvas.height);
    }

    // --- Visualizer Animation Loops ---
    function drawUserVisualizer() {
      if (!isRecording || !recordingAnalyser) return;
      
      userAnimId = requestAnimationFrame(drawUserVisualizer);
      
      const bufferLength = recordingAnalyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      recordingAnalyser.getByteFrequencyData(dataArray);
      
      const width = userCanvas.width;
      const height = userCanvas.height;
      
      userCtx.clearRect(0, 0, width, height);
      userCtx.fillStyle = 'rgba(0,0,0,0)';
      userCtx.fillRect(0, 0, width, height);
      
      const barWidth = (width / bufferLength) * 2.5;
      let barHeight;
      let x = 0;
      
      for (let i = 0; i < bufferLength; i++) {
        barHeight = (dataArray[i] / 255) * height * 0.9;
        
        // Draw green gradient bars
        const grad = userCtx.createLinearGradient(0, height, 0, height - barHeight);
        grad.addColorStop(0, '#047857');
        grad.addColorStop(1, '#10b981');
        
        userCtx.fillStyle = grad;
        userCtx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
        
        x += barWidth;
      }
    }

    function drawAgentVisualizer() {
      if (!playbackAnalyser) return;
      
      agentAnimId = requestAnimationFrame(drawAgentVisualizer);
      
      const bufferLength = playbackAnalyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      playbackAnalyser.getByteFrequencyData(dataArray);
      
      const width = agentCanvas.width;
      const height = agentCanvas.height;
      
      agentCtx.clearRect(0, 0, width, height);
      agentCtx.fillStyle = 'rgba(0,0,0,0)';
      agentCtx.fillRect(0, 0, width, height);
      
      const barWidth = (width / bufferLength) * 2.5;
      let barHeight;
      let x = 0;
      
      for (let i = 0; i < bufferLength; i++) {
        barHeight = (dataArray[i] / 255) * height * 0.9;
        
        // Draw purple gradient bars
        const grad = agentCtx.createLinearGradient(0, height, 0, height - barHeight);
        grad.addColorStop(0, '#5b21b6');
        grad.addColorStop(1, '#8b5cf6');
        
        agentCtx.fillStyle = grad;
        agentCtx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
        
        x += barWidth;
      }
    }

    // --- Message Log Helpers ---
    let currentAgentMsgBubble = null;

    function appendMessage(sender, text) {
      // Remove interim bubble if any
      const interimMsg = document.querySelector('.message.interim');
      if (interimMsg) {
        interimMsg.remove();
      }

      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (sender === 'agent') {
        currentAgentMsgBubble = msg;
      } else {
        currentAgentMsgBubble = null;
      }
    }

    function updateInterimMessage(text) {
      let interimBubble = document.querySelector('.message.interim');
      if (!interimBubble) {
        interimBubble = document.createElement('div');
        interimBubble.className = 'message interim';
        chatMessages.appendChild(interimBubble);
      }
      interimBubble.textContent = text;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function finalizeUserMessage(text) {
      const interimBubble = document.querySelector('.message.interim');
      if (interimBubble) {
        interimBubble.remove();
      }
      appendMessage('user', text || "(Silence)");
      resetLatencyDisplay();
    }

    function appendOrUpdateAgentResponse(text) {
      if (currentAgentMsgBubble) {
        // We append to the existing speaking bubble
        currentAgentMsgBubble.textContent += ' ' + text;
      } else {
        // Create new bubble
        appendMessage('agent', text);
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- Latency Monitor Helpers ---
    function updateLatencyDisplay(metrics) {
      const asrEl = document.getElementById('asrLatency');
      const llmEl = document.getElementById('llmLatency');
      const ttsEl = document.getElementById('ttsLatency');
      const totalEl = document.getElementById('totalLatency');
      
      if (asrEl) asrEl.textContent = metrics.asr_ms + ' ms';
      if (llmEl) llmEl.textContent = metrics.llm_ms + ' ms';
      if (ttsEl) ttsEl.textContent = metrics.tts_ms + ' ms';
      if (totalEl) totalEl.textContent = metrics.total_ms + ' ms';

      if (asrEl) setLatencyColor(asrEl, metrics.asr_ms, 200, 500);
      if (llmEl) setLatencyColor(llmEl, metrics.llm_ms, 300, 600);
      if (ttsEl) setLatencyColor(ttsEl, metrics.tts_ms, 200, 400);
      if (totalEl) setLatencyColor(totalEl, metrics.total_ms, 600, 1200);
    }

    function setLatencyColor(element, value, goodThreshold, fairThreshold) {
      if (value <= goodThreshold) {
        element.style.color = '#10b981'; // Green
      } else if (value <= fairThreshold) {
        element.style.color = '#f59e0b'; // Amber
      } else {
        element.style.color = '#ef4444'; // Red
      }
    }

    function resetLatencyDisplay() {
      const asrEl = document.getElementById('asrLatency');
      const llmEl = document.getElementById('llmLatency');
      const ttsEl = document.getElementById('ttsLatency');
      const totalEl = document.getElementById('totalLatency');
      
      if (asrEl) { asrEl.textContent = '-- ms'; asrEl.style.color = ''; }
      if (llmEl) { llmEl.textContent = '-- ms'; llmEl.style.color = ''; }
      if (ttsEl) { ttsEl.textContent = '-- ms'; ttsEl.style.color = ''; }
      if (totalEl) { totalEl.textContent = '-- ms'; totalEl.style.color = ''; }
    }

    // Resume AudioContext in case of browser security locks
    document.addEventListener('click', () => {
      if (playbackAudioContext && playbackAudioContext.state === 'suspended') {
        playbackAudioContext.resume();
      }
      if (recordingAudioContext && recordingAudioContext.state === 'suspended') {
        recordingAudioContext.resume();
      }
    });

  </script>
</body>
