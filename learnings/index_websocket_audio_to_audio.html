<!DOCTYPE html>
<html>
<head>
    <title>Audio WebSocket Pipeline</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px; margin: 5px; }
        #status { margin: 10px 0; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Audio WebSocket Pipeline</h1>
    <div id="status">Disconnected</div>
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <button id="startAudioBtn" disabled>Start Audio Stream</button>
    <button id="stopAudioBtn" disabled>Stop Audio Stream</button>
    <div id="messages"></div>

    <script>
        let ws = null;
        let mediaStream = null;
        let audioProcessor = null;
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');

        // Update UI status
        function updateStatus(status) {
            statusEl.textContent = status;
            console.log(status);
        }

        // Connect to WebSocket
        document.getElementById('connectBtn').addEventListener('click', async () => {
            ws = new WebSocket('ws://localhost:8000/ws_audio');
            
            ws.onopen = () => {
                updateStatus('Connected');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('startAudioBtn').disabled = false;
            };
            
            ws.onmessage = (event) => {
                messagesEl.innerHTML += `<div>Server: ${event.data}</div>`;
            };
            
            ws.onclose = () => {
                updateStatus('Disconnected');
                resetButtons();
                stopAudioStream();
            };
            
            ws.onerror = (error) => {
                updateStatus(`Error: ${error.message}`);
                resetButtons();
            };
        });

        // Disconnect from WebSocket
        document.getElementById('disconnectBtn').addEventListener('click', () => {
            if (ws) {
                ws.close();
            }
        });

        // Start audio stream
        document.getElementById('startAudioBtn').addEventListener('click', async () => {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(mediaStream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                processor.onaudioprocess = (e) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const audioData = e.inputBuffer.getChannelData(0);
                        const buffer = new Int16Array(audioData.length);
                        for (let i = 0; i < audioData.length; i++) {
                            buffer[i] = audioData[i] * 32767; // Convert to 16-bit
                        }
                        ws.send(buffer.buffer);
                    }
                };
                
                updateStatus('Streaming audio...');
                document.getElementById('startAudioBtn').disabled = true;
                document.getElementById('stopAudioBtn').disabled = false;
                
            } catch (error) {
                updateStatus(`Audio Error: ${error.message}`);
            }
        });

        // Stop audio stream
        document.getElementById('stopAudioBtn').addEventListener('click', stopAudioStream);

        function stopAudioStream() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                updateStatus('Audio stream stopped');
                document.getElementById('startAudioBtn').disabled = false;
                document.getElementById('stopAudioBtn').disabled = true;
            }
        }

        function resetButtons() {
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('startAudioBtn').disabled = true;
            document.getElementById('stopAudioBtn').disabled = true;
        }
    </script>
</body>
</html>
